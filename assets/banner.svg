<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="360" fill="#030604"/>

  <defs>
    <radialGradient id="mainGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 130) rotate(24) scale(700 360)">
      <stop stop-color="#00D26A" stop-opacity="0.30"/>
      <stop offset="0.48" stop-color="#00D26A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#00D26A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineFade" x1="70" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
