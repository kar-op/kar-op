      <stop offset="0.18" stop-color="#00D26A" stop-opacity="0.55"/>
      <stop offset="0.82" stop-color="#00D26A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00D26A" stop-opacity="0"/>
